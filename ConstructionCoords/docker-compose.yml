services:
  db_postgres:
    image: postgres:16-alpine
    container_name: construction_coords_db
    environment:
      POSTGRES_DB: construction_coords
      POSTGRES_USER: ${POSTGRES_SQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_SQL_PASSWORD}
    volumes:
      - construction_coords_db_vol:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SQL_USERNAME} -d construction_coords"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construction_coords_backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_SQL_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_SQL_PASSWORD}
      POSTGRES_ENDPOINT: db_postgres
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db_postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construction_coords_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  construction_coords_db_vol: